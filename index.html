<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XUMOD - Kho ứng dụng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #333;
            line-height: 1.5;
        }

        .app-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px 16px;
            background: #fff;
            border-bottom: 1px solid #f0f0f0;
        }

        .app-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }

        .app-info h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .app-info p {
            font-size: 14px;
            color: #888;
        }

        .container {
            padding: 16px;
            max-width: 700px;
            margin: 0 auto;
        }

        .category {
            margin-bottom: 24px;
            border-radius: 12px;
            overflow: hidden;
            background: #f8f9fc;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f0f2fa;
        }

        .category-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: #6366f1;
        }

        .count {
            font-size: 14px;
            color: #888;
        }

        .app-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: #ffffff;
            border-bottom: 1px solid #f0f0f0;
            text-decoration: none;
            color: inherit;
            transition: background 0.2s;
        }

        .app-item:hover {
            background: #f9fafc;
        }

        .app-item:last-child {
            border-bottom: none;
        }

        .app-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-logo {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: #eee;
            overflow: hidden;
        }

        .app-text h3 {
            font-size: 16px;
            font-weight: 500;
        }

        .app-text p {
            font-size: 13px;
            color: #888;
        }

        .arrow {
            color: #ccc;
            font-size: 18px;
        }
    </style>
</head>

<div class="app-header">
